{
  "lockfile-version": 1,
  "manifest": {
    "version": 1,
    "install": {
      "phi-4-mini-fp8": {
        "pkg-path": "flox/phi-4-mini-instruct-fp8-sglang",
        "pkg-group": "model",
        "systems": [
          "x86_64-linux"
        ]
      },
      "sglang": {
        "pkg-path": "flox/sglang-python312-cuda12_8-all-avx2",
        "pkg-group": "sglang",
        "systems": [
          "x86_64-linux"
        ]
      }
    },
    "vars": {
      "SGLANG_HOST": "0.0.0.0",
      "SGLANG_PORT": "30000"
    },
    "hook": {
      "on-activate": "  # Isolate from any outer Python environment\n  unset PYTHONPATH\n  unset PYTHONHOME\n\n  # Resolve the sglang store path for PYTHONPATH construction\n  _sglang_store=\"$(dirname \"$(dirname \"$(readlink -f \"$(which sglang)\")\")\")\"\n\n  # Add Python 3.12 to PATH for interactive use\n  _sglang_python=\"$(nix-store -qR \"$_sglang_store\" | grep -F 'python3-3.12' | head -1)\"\n  export PATH=\"$_sglang_python/bin:$PATH\"\n\n  # Build PYTHONPATH from the full Nix closure for interactive python3.12\n  _pp=\"\"\n  for dep in $(nix-store -qR \"$_sglang_store\"); do\n    sp=\"$dep/lib/python3.12/site-packages\"\n    if [ -d \"$sp\" ]; then\n      _pp=\"${_pp:+$_pp:}$sp\"\n    fi\n  done\n  export PYTHONPATH=\"$_pp\"\n\n  # deep_gemm JIT needs CUDA_HOME to find nvcc\n  export CUDA_HOME=\"$(nix-store -qR \"$_sglang_store\" | grep -F 'cuda_nvcc' | head -1)\"\n\n  # JIT compilation needs CUDA headers (cuda_runtime.h, nv/target, etc.) and\n  # libraries (libcudart.so, etc.) from separate Nix store paths.\n  # Build CPATH and LIBRARY_PATH from all cuda12.8-* directories.\n  _cpath=\"\"\n  _lpath=\"\"\n  for dep in $(nix-store -qR \"$_sglang_store\"); do\n    case \"$dep\" in\n      *cuda12.8-*)\n        if [ -d \"$dep/include\" ]; then\n          _cpath=\"${_cpath:+$_cpath:}$dep/include\"\n        fi\n        for _libdir in \"$dep/lib\" \"$dep/lib64\"; do\n          if [ -d \"$_libdir\" ]; then\n            _lpath=\"${_lpath:+$_lpath:}$_libdir\"\n          fi\n        done\n        ;;\n    esac\n  done\n  export CPATH=\"${_cpath}${CPATH:+:$CPATH}\"\n  export LIBRARY_PATH=\"${_lpath}${LIBRARY_PATH:+:$LIBRARY_PATH}\"\n\n  unset _sglang_store _sglang_python _pp _cpath _lpath _libdir\n\n  # ── Bundled HuggingFace model resolution ──────────────────────────\n  # If SGLANG_MODEL looks like a HF model ID (contains \"/\" and is not\n  # already a local path), check whether a matching model package is\n  # bundled in the Flox environment closure.  If found, rewrite\n  # SGLANG_MODEL to the snapshot path so SGLang uses the local copy\n  # instead of downloading from HuggingFace Hub.\n  #\n  # Two layouts are supported:\n  #   1. HF cache:  share/models/hub/models--<org>--<name>/snapshots/<hash>/\n  #   2. Flat:      share/models/<name>/   (model name = part after \"/\" in ID)\n  _sglang_model=\"${SGLANG_MODEL:-meta-llama/Llama-3.1-8B-Instruct}\"\n  _resolved_dir=\"\"\n  case \"$_sglang_model\" in\n    */*)\n      if [ ! -d \"$_sglang_model\" ]; then\n        # Try layout 1: HF cache (hub/models--<slug>/snapshots/<hash>/)\n        _hf_slug=\"${_sglang_model//\\//-\\-}\"\n        _hub_dir=\"$FLOX_ENV/share/models/hub/models--${_hf_slug}\"\n        if [ -d \"$_hub_dir/snapshots\" ]; then\n          if [ -f \"$_hub_dir/refs/main\" ]; then\n            _snap_hash=\"$(cat \"$_hub_dir/refs/main\")\"\n            if [ -d \"$_hub_dir/snapshots/$_snap_hash\" ]; then\n              _resolved_dir=\"$_hub_dir/snapshots/$_snap_hash\"\n            fi\n          fi\n          if [ -z \"$_resolved_dir\" ]; then\n            for _d in \"$_hub_dir/snapshots\"/*/; do\n              if [ -d \"$_d\" ]; then\n                _resolved_dir=\"${_d%/}\"\n                break\n              fi\n            done\n          fi\n        fi\n        # Try layout 2: flat (share/models/<model-name>/)\n        if [ -z \"$_resolved_dir\" ]; then\n          _model_name=\"${_sglang_model#*/}\"\n          _flat_dir=\"$FLOX_ENV/share/models/$_model_name\"\n          if [ -d \"$_flat_dir\" ]; then\n            _resolved_dir=\"$_flat_dir\"\n          fi\n        fi\n        # Apply resolution if a valid model dir was found\n        if [ -n \"$_resolved_dir\" ] && [ -f \"$_resolved_dir/config.json\" ]; then\n          export SGLANG_BUNDLED_FROM=\"$_sglang_model\"\n          # ── Tokenizer compat shim ──\n          # Models built with transformers >=4.58 may have tokenizer_class=TokenizersBackend\n          # which SGLang's bundled transformers 4.57.6 doesn't recognize.\n          # Create a shadow dir with symlinks + patched tokenizer_config.json.\n          # Remove once SGLang ships transformers >=4.58.\n          _tc_file=\"$_resolved_dir/tokenizer_config.json\"\n          if [ -f \"$_tc_file\" ] && grep -q '\"TokenizersBackend\"' \"$_tc_file\"; then\n            _shadow=\"${FLOX_ENV_CACHE:-$HOME/.cache/flox}/sglang-compat/$(basename \"$_resolved_dir\")\"\n            if [ ! -f \"$_shadow/tokenizer_config.json\" ] || ! grep -q '\"PreTrainedTokenizerFast\"' \"$_shadow/tokenizer_config.json\"; then\n              rm -rf \"$_shadow\"\n              mkdir -p \"$_shadow\"\n              ln -sf \"$_resolved_dir\"/* \"$_shadow/\"\n              rm -f \"$_shadow/tokenizer_config.json\"\n              sed 's/\"TokenizersBackend\"/\"PreTrainedTokenizerFast\"/g' \"$_tc_file\" > \"$_shadow/tokenizer_config.json\"\n            fi\n            _resolved_dir=\"$_shadow\"\n            echo \"  tokenizer compat: TokenizersBackend -> PreTrainedTokenizerFast (shadow)\" >&2\n            unset _shadow\n          fi\n          unset _tc_file\n          export SGLANG_MODEL=\"$_resolved_dir\"\n          export HF_HUB_OFFLINE=1\n          echo \"  bundled model: $_sglang_model -> $SGLANG_MODEL\" >&2\n        fi\n        unset _hf_slug _hub_dir _snap_hash _d _model_name _flat_dir\n      fi\n      ;;\n  esac\n  unset _sglang_model _resolved_dir\n\n  # FlashInfer JIT needs a writable cache dir (nix store is read-only)\n  export FLASHINFER_JIT_DIR=\"${FLOX_ENV_CACHE:-$HOME/.cache/flox}/flashinfer-jit\"\n  mkdir -p \"$FLASHINFER_JIT_DIR\"\n"
    },
    "profile": {
      "common": "  echo \"SGLang 0.5.9 runtime (all GPUs SM75-SM120, AVX2, CUDA 12.8)\"\n  if [ -n \"${SGLANG_BUNDLED_FROM:-}\" ]; then\n    echo \"  model: $SGLANG_BUNDLED_FROM (bundled)\"\n  else\n    echo \"  model: ${SGLANG_MODEL:-meta-llama/Llama-3.1-8B-Instruct} (will download from HF)\"\n  fi\n  echo \"  sglang serve: flox activate -s  (set SGLANG_MODEL to choose model)\"\n  echo \"  interactive:  python3.12\"\n"
    },
    "options": {
      "systems": [
        "x86_64-linux"
      ],
      "cuda-detection": false
    },
    "services": {
      "sglang": {
        "command": "exec python3.12 -m sglang.launch_server --model-path \"${SGLANG_MODEL:-meta-llama/Llama-3.1-8B-Instruct}\" --host $SGLANG_HOST --port $SGLANG_PORT",
        "is-daemon": false
      }
    }
  },
